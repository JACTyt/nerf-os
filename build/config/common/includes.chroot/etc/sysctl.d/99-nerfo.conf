# NerfOS kernel performance tweaks
# Tuned for old HDD hardware with limited RAM

# Use RAM aggressively before swapping (0=never swap, 100=swap aggressively)
vm.swappiness = 10

# Keep filesystem cache longer (100=default, 50=keep more cache)
vm.vfs_cache_pressure = 50

# Disable NMI watchdog — frees one CPU interrupt for applications
kernel.nmi_watchdog = 0

# Reduce write-back delay for HDD (less data lost on crash, less I/O spikes)
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5
