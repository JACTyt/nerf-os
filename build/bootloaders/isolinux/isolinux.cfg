# NerfOS isolinux config (legacy BIOS)

UI menu.c32
PROMPT 0
TIMEOUT 50
DEFAULT gui

MENU TITLE NerfOS Boot Menu

LABEL gui
  MENU LABEL Start NerfOS (GUI)
  KERNEL /live/vmlinuz
  APPEND initrd=/live/initrd.img boot=live quiet splash nerf.mode=gui

LABEL terminal
  MENU LABEL Start NerfOS (Terminal)
  KERNEL /live/vmlinuz
  APPEND initrd=/live/initrd.img boot=live quiet nerf.mode=terminal

LABEL install
  MENU LABEL Install NerfOS
  KERNEL /live/vmlinuz
  APPEND initrd=/live/initrd.img boot=live quiet nerf.mode=gui nerf.install=1

LABEL hd
  MENU LABEL Boot from first hard disk
  LOCALBOOT 0x80
