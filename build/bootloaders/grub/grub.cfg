# NerfOS GRUB boot menu

set default=0
set timeout=5
set timeout_style=menu

insmod all_video
insmod gfxterm
terminal_output gfxterm

menuentry "Start NerfOS (GUI)" {
    linux /live/vmlinuz boot=live quiet splash nerf.mode=gui
    initrd /live/initrd.img
}

menuentry "Start NerfOS (Terminal)" {
    linux /live/vmlinuz boot=live quiet nerf.mode=terminal
    initrd /live/initrd.img
}

menuentry "Install NerfOS" {
    linux /live/vmlinuz boot=live quiet nerf.mode=gui nerf.install=1
    initrd /live/initrd.img
}

menuentry "Boot from first hard disk" {
    set root=(hd0)
    chainloader +1
}
