name: NerfOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # ── Fast feedback on every push / PR ─────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run all unit test suites
        run: |
          bash tests/test_build_sh.sh
          bash tests/test_boot_mode.sh
          bash tests/test_nerf_optim.sh
          bash tests/test_nerf_install.sh

  # ── ISO build — runs inside Debian Trixie so live-build detects the ──────
  # ── correct host (Ubuntu runners cause wrong kernel package names)   ──────
  build:
    name: Build x86_64 ISO
    runs-on: ubuntu-latest
    needs: unit-tests
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    container:
      image: debian:trixie
      options: --privileged  # required for debootstrap chroot + device nodes

    steps:
      - name: Install git (needed by actions/checkout inside container)
        run: apt-get update && apt-get install -y git

      - uses: actions/checkout@v4

      # live-build + debootstrap use significant disk space; remove unused
      # container layers that may be present in the runner's overlay fs.
      - name: Free disk space
        run: |
          apt-get clean
          df -h

      - name: Install build dependencies
        run: |
          apt-get install -y \
            live-build \
            debootstrap \
            debian-archive-keyring \
            xorriso \
            isolinux \
            syslinux-common

      - name: Build x86_64 ISO
        run: bash build/build.sh x86_64

      - name: Verify ISO
        run: |
          ls -lh output/nerf-os-1.0-x86_64.iso
          file output/nerf-os-1.0-x86_64.iso | grep -q "ISO 9660"
          echo "PASS: ISO is a valid ISO 9660 image"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: nerf-os-1.0-x86_64
          path: output/nerf-os-1.0-x86_64.iso
          retention-days: 7

  # ── QEMU boot test — runs on Ubuntu host to get KVM access ───────────────
  qemu-test:
    name: QEMU boot test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: nerf-os-1.0-x86_64
          path: output/

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm || echo "KVM not available — will fall back to emulation"

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils

      - name: QEMU boot test (terminal mode, headless)
        run: bash tests/test_qemu_boot.sh output/nerf-os-1.0-x86_64.iso
