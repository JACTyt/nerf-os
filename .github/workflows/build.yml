name: NerfOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # ── Fast feedback on every push / PR ─────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run all unit test suites
        run: |
          bash tests/test_build_sh.sh
          bash tests/test_boot_mode.sh
          bash tests/test_nerf_optim.sh
          bash tests/test_nerf_install.sh

  # ── Full ISO build + QEMU boot test (main branch and manual triggers) ────
  build-and-test:
    name: Build x86_64 ISO + QEMU boot test
    runs-on: ubuntu-latest
    needs: unit-tests
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      # GitHub Actions runners ship with a lot of pre-installed tooling that
      # eats disk space.  live-build + debootstrap need ~8 GB of headroom.
      - name: Free disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost
          df -h

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm || echo "KVM not available — will fall back to emulation"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build \
            debootstrap \
            qemu-system-x86 \
            qemu-utils \
            ovmf

      - name: Build x86_64 ISO
        run: sudo bash build/build.sh x86_64

      - name: Verify ISO
        run: |
          ls -lh output/nerf-os-1.0-x86_64.iso
          file output/nerf-os-1.0-x86_64.iso | grep -q "ISO 9660"
          echo "PASS: ISO is a valid ISO 9660 image"

      - name: QEMU boot test (terminal mode, headless)
        run: bash tests/test_qemu_boot.sh output/nerf-os-1.0-x86_64.iso

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: nerf-os-1.0-x86_64
          path: output/nerf-os-1.0-x86_64.iso
          retention-days: 7
